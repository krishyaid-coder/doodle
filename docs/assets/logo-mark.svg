<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="doodle">
  <title>doodle</title>
  <!-- highlighter wash -->
  <rect x="6" y="42" width="108" height="38" rx="19" fill="#FFE45E" opacity="0.85"/>
  <!-- a scribble that resolves into a checkmark -->
