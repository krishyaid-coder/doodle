<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" role="img" aria-label="doodle">
  <title>doodle — a linter for Claude SKILL.md files</title>
  <defs>
    <style>
      .word { font-family: ui-rounded, "SF Pro Rounded", "Quicksand", "Comfortaa", system-ui, sans-serif;
              font-weight: 700; font-size: 88px; fill: #6EE7B7; letter-spacing: -2px; }
      .tag  { font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
              font-size: 16px; fill: #9CA3AF; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- mark (lime wash stays for both modes — provides its own contrast) -->
  <g transform="translate(8 18)">
    <rect x="6" y="42" width="108" height="38" rx="19" fill="#BEF264"/>
    <path
      d="M 18 62 C 26 44, 38 44, 46 62 S 64 80, 72 62 L 86 84 L 108 30"
      fill="none" stroke="#064E3B" stroke-width="8"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="148" y="98" class="word">doodle</text>

  <!-- sparkle accent -->
  <path d="M 408 38 L 412 50 L 424 54 L 412 58 L 408 70 L 404 58 L 392 54 L 404 50 Z"
        fill="#34D399"/>

  <!-- spellcheck squiggle under the word -->
  <path
    d="M 150 118
       q 8 -8, 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0"
    fill="none" stroke="#FB7185" stroke-width="3" stroke-linecap="round"/>

  <!-- tagline -->
  <text x="150" y="144" class="tag">a linter for Claude SKILL.md files</text>
</svg>
