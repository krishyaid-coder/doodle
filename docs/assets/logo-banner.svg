<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" role="img" aria-label="doodle">
  <title>doodle — a linter for Claude SKILL.md files</title>
  <defs>
    <style>
      .word { font-family: ui-rounded, "SF Pro Rounded", "Quicksand", "Comfortaa", system-ui, sans-serif;
              font-weight: 700; font-size: 88px; fill: #1A1A1A; letter-spacing: -2px; }
      .tag  { font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
              font-size: 16px; fill: #6B6B6B; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- mark -->
  <g transform="translate(8 18)">
    <rect x="6" y="42" width="108" height="38" rx="19" fill="#FFE45E" opacity="0.85"/>
    <path
      d="M 18 62 C 26 44, 38 44, 46 62 S 64 80, 72 62 L 86 84 L 108 30"
      fill="none" stroke="#1A1A1A" stroke-width="8"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="148" y="98" class="word">doodle</text>

  <!-- spellcheck squiggle under the word -->
  <path
    d="M 150 116
       q 8 -8, 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0 t 16 0"
    fill="none" stroke="#E5484D" stroke-width="3"
    stroke-linecap="round"/>

  <!-- tagline -->
  <text x="150" y="142" class="tag">a linter for Claude SKILL.md files</text>
</svg>
